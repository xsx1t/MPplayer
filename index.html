<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Player</title>

<style>
body {
background: #0d0d0d;
color: white;
font-family: Arial, sans-serif;
text-align: center;
padding: 20px;
}

h1 {
margin-bottom: 15px;
}

input, button {
padding: 10px;
margin: 8px;
font-size: 16px;
border-radius: 8px;
border: none;
}

button {
background: #e50914;
color: white;
cursor: pointer;
}

video {
width: 90%;
max-width: 1000px;
margin-top: 20px;
background: black;
border-radius: 10px;
}
</style>
</head>
<body>

<h1>🎬 Movie Player</h1>

<!-- LINK INPUT -->
<div>
<input id="url" placeholder="Paste .mp4 link here">
<button onclick="loadLink()">Play Link</button>
</div>

<!-- FILE INPUT -->
<div>
<input type="file" accept="video/*" onchange="loadFile(event)">
</div>

<!-- VIDEO PLAYER -->
<video id="video" controls playsinline></video>

<script>
const video = document.getElementById("video");

// Load video from link
function loadLink() {
const link = document.getElementById("url").value;

if (!link) {
alert("Paste a link first");
return;
}

video.src = link;
video.load();
video.play();
}

// Load local file
function loadFile(event) {
const file = event.target.files[0];

if (!file) return;

video.src = URL.createObjectURL(file);
video.play();
}

// Error handling
video.onerror = () => {
alert("Video failed to load. The link might be blocked or invalid.");
};
</script>

</body>
</html>
