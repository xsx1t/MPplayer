<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Player</title>
<style>
body {
background: #0d0d0d;
color: white;
font-family: Arial, sans-serif;
text-align: center;
padding: 20px;
}

h1 {
margin-bottom: 20px;
}

input {
width: 60%;
padding: 10px;
font-size: 16px;
border-radius: 8px;
border: none;
margin-bottom: 10px;
}

button {
padding: 10px 20px;
font-size: 16px;
border: none;
border-radius: 8px;
background-color: #e50914;
color: white;
cursor: pointer;
}

video {
margin-top: 20px;
width: 85%;
max-width: 1000px;
border-radius: 10px;
background: black;
}
</style>
</head>
<body>

<h1>🎬 Movie Player</h1>

<input type="text" id="videoURL" placeholder="Paste .mp4 link here">
<br>
<button onclick="playVideo()">Play</button>

<video id="player" controls autoplay>
<source src="https://dn720400.ca.archive.org/0/items/la-belle-personne/la%20belle%2gm0personne.ia.mp4" type="video/mp4">
Your browser does not support video.
</video>

<script>
function playVideo() {
const url = document.getElementById("videoURL").value;
const player = document.getElementById("player");

if (url.trim() === "") {
alert("Enter a video link first.");
return;
}

player.src = url;
player.play();
}
</script>

</body>
</html>
